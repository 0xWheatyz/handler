# Alembic config. The database URL is injected from handler.config in env.py,
# so one config serves both the Postgres and SQLite backends — set DATABASE_URL
# and run `alembic upgrade head`.
[alembic]
script_location = src/handler/migrations
prepend_sys_path = src
# sqlalchemy.url is intentionally left blank; env.py fills it from Settings.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
